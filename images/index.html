function popUp(loc, ext, size) { 
	var where = loc + "." + ext;
	var winname = loc + "win";
	var features = size + "toolbar=no,directories=no,status=no,scrollbars=yes,resizable=yes,menubar=no,location=no,copyhistory=no";

}

    "images/27.png",
    "images/28.png"
];
let index = 0;
function changeImage() {
    // Update the image source to the current index in the array
    imgElement.src = images[index];

    // Increment the index for the next image
    index++;

    // Reset the index to 0 if it exceeds the array length, creating a loop
    if (index === images.length) {
        index = 0;
    }
}
// Note: In the function every 1000 milliseconds (1.0 second)
setInterval(changeImage, 7000);
